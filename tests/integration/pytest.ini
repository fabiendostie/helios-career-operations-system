[tool:pytest]
# Pytest configuration for Helios integration tests

# Test discovery
testpaths = tests/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    integration: Integration tests requiring all services
    performance: Performance and load testing
    error_handling: Error handling and resilience tests
    data_validation: Data integrity and validation tests
    slow: Tests that take more than 30 seconds
    fast: Tests that complete in under 10 seconds
    smoke: Quick smoke tests for basic functionality
    regression: Regression tests for known issues

# Test output configuration
addopts =
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --durations=10
    --maxfail=10
    --color=yes
    --capture=no

# Async test configuration
asyncio_mode = auto

# Timeout configuration
timeout = 300
timeout_method = thread

# Coverage configuration
addopts = --cov=services --cov-report=html:reports/coverage --cov-report=term --cov-report=xml

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# Minimum version requirements
minversion = 7.0

# Test collection
collect_ignore = [
    "setup.py",
    "conftest.py"
]

# Custom test collection
norecursedirs = .git .tox dist build *.egg node_modules