# VERIFICATION PROTOCOLS (ENHANCED - PREVENTS DOCUMENTATION DRIFT)
verification:
  enabled: true
  protocols_file: "bmad-core/verification-protocols.yaml"
  enforcement_level: "MANDATORY"

  # Status change gates - NO BYPASSING
  status_gates:
    completion_requires_verification: true
    auto_rollback_on_failure: true
    prevent_false_claims: true
    documentation_accuracy_required: true

  # Enhanced verification commands
  scripts:
    comprehensive_verification: "python bmad-core/scripts/enhanced-verification.py"
    verify_agent: "python bmad-core/scripts/verify-agent.py"
    verify_dependencies: "python bmad-core/scripts/verify-dependencies.py"
    verify_documentation_accuracy: "python bmad-core/scripts/verify-docs.py"

  # Automated verification schedule
  automation:
    daily_verification: true
    documentation_drift_check: true
    service_health_monitoring: true

  # Minimum thresholds
  thresholds:
    dependency_satisfaction: 100  # All dependencies must be satisfied
    test_pass_rate: 80           # Minimum 80% test pass rate
    import_success_rate: 100     # All imports must succeed
    documentation_accuracy: 95   # Documentation must reflect reality

  # Anti-drift protocols
  drift_prevention:
    enabled: true
    check_frequency: "daily"
    auto_correct_minor_drift: true
    alert_on_major_drift: true
    require_manual_approval_for_status_changes: true

