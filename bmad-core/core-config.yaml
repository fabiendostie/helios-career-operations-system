# VERIFICATION PROTOCOLS (MANDATORY)
verification:
  enabled: true
  protocols_file: "bmad-core/verification-protocols.yaml"
  enforcement_level: "MANDATORY"
  
  # Status change gates - NO BYPASSING
  status_gates:
    completion_requires_verification: true
    auto_rollback_on_failure: true
    prevent_false_claims: true
    
  # Verification commands
  scripts:
    verify_agent: "python bmad-core/scripts/verify-agent.py"
    verify_dependencies: "python bmad-core/scripts/verify-dependencies.py"
    
  # Minimum thresholds  
  thresholds:
    dependency_satisfaction: 100  # All dependencies must be satisfied
    test_pass_rate: 80           # Minimum 80% test pass rate
    import_success_rate: 100     # All imports must succeed

