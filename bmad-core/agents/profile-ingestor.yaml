# BMAD Agent Configuration
# Profile Ingestor Agent (Story 1.1 - COMPLETED)

agent_id: "PROFILE_INGESTOR"
version: "1.0.0"
status: "completed"

metadata:
  name: "Profile Ingestor"
  description: "Deep conversational profiling using psychological frameworks"
  story: "1.1"
  completion_date: "2025-01-04"
  test_coverage: "99%"
  test_count: 208

capabilities:
  - "Multi-format resume processing (PDF, DOCX, MD, TXT, YAML, JSON)"
  - "Bilingual NLP processing (English/French)"
  - "Interactive conflict resolution"
  - "Skill mapping with fuzzy matching"
  - "Schema-validated JSON output"

integration:
  service_location: "services/profile-ingestor/"
  api_endpoint: "/api/v1/ingest"
  health_check: "/health"
  
  input_formats:
    - "directory_path"
    - "file_uploads"
    
  output_format:
    type: "json"
    schema: "master_career_database"
    
commands:
  - command: "/ingest"
    description: "Process resume files and extract career data"
    parameters:
      - name: "directory_path"
        type: "string"
        required: true
      - name: "languages"
        type: "array"
        default: ["en", "fr"]
        
dependencies:
  python_version: ">=3.11"
  packages:
    - "spacy>=4.0.2"
    - "questionary>=2.1.0" 
    - "pypdf>=4.5.1"
    - "python-docx>=1.2.0"
    - "PyYAML>=6.1.0"
    - "mistune>=3.1.0"
    
  models:
    - "en_core_web_sm"
    - "fr_core_news_sm"

performance:
  max_files_per_batch: 50
  processing_time_avg: "2.5s per file"
  memory_usage: "256MB typical"
  
monitoring:
  logs: "services/profile-ingestor/logs/"
  metrics:
    - "files_processed_total"
    - "processing_time_seconds" 
    - "conflicts_resolved_total"