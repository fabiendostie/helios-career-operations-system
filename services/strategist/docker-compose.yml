version: '3.8'

services:
  strategist:
    build: .
    ports:
      - "8002:8002"
    environment:
      - STRATEGIST_DEBUG=true
      - STRATEGIST_ORCHESTRATOR_URL=http://orchestrator:8001
    volumes:
      - ./src:/app/src  # For development hot reload
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - helios-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - helios-network

volumes:
  redis_data:

networks:
  helios-network:
    external: true
