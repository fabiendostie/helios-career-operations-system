verb_scoring_weights:
  high_impact: 1.0
  medium_impact: 0.6
  low_impact: 0.3
  weak_verbs: 0.0

quantification_patterns:
  percentage: "\\d+\\.?\\d*%"
  currency: "\\$[\\d,]+"
  numbers_with_units: "\\d+\\s*(seconds?|minutes?|hours?|days?|weeks?|months?|years?|K|M|B|thousand|million|billion)"
  time_periods: "\\d+\\s*(week|month|year|day)s?"
  metrics: "\\d+x|\\d+\\.\\d+x"
  ranges: "\\d+-\\d+"
