# PostgreSQL Database Deployment for HELIOS Career Operations System
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: helios
  labels:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: fast-ssd  # Adjust based on your cluster
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helios-postgres
  namespace: helios
  labels:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: database
    app.kubernetes.io/version: "15.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: helios-postgres
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: helios-postgres
        app.kubernetes.io/component: database
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
      - name: postgres
        image: postgres:15-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: helios-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: helios-postgres-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: helios-postgres-secret
              key: POSTGRES_PASSWORD
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        - name: postgres-config
          mountPath: /docker-entrypoint-initdb.d
          readOnly: true
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - $(POSTGRES_USER)
            - -d
            - $(POSTGRES_DB)
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - $(POSTGRES_USER)
            - -d
            - $(POSTGRES_DB)
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          limits:
            cpu: "2"
            memory: "2Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: postgres-config
        configMap:
          name: postgres-init-config
          optional: true
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: helios-postgres
  namespace: helios
  labels:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: helios-postgres
    app.kubernetes.io/component: database
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-config
  namespace: helios
  labels:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: database
data:
  init.sql: |
    -- HELIOS Career Operations System Database Initialization
    
    -- Create extensions
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pg_trgm";
    
    -- Create schemas
    CREATE SCHEMA IF NOT EXISTS helios_sessions;
    CREATE SCHEMA IF NOT EXISTS helios_profiles;
    CREATE SCHEMA IF NOT EXISTS helios_analytics;
    
    -- Grant permissions
    GRANT ALL PRIVILEGES ON SCHEMA helios_sessions TO helios_user;
    GRANT ALL PRIVILEGES ON SCHEMA helios_profiles TO helios_user;
    GRANT ALL PRIVILEGES ON SCHEMA helios_analytics TO helios_user;
    
    -- Create initial tables will be handled by application migrations