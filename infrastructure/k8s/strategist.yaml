# Strategist Service Deployment for HELIOS
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-models-pvc
  namespace: helios
  labels:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: strategist
spec:
  accessModes:
    - ReadWriteMany  # Multiple pods need access to ML models
  resources:
    requests:
      storage: 5Gi  # For transformer models (~2.8GB)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helios-strategist
  namespace: helios
  labels:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: strategist
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: helios-strategist
      app.kubernetes.io/component: strategist
  template:
    metadata:
      labels:
        app.kubernetes.io/name: helios-strategist
        app.kubernetes.io/component: strategist
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: strategist
        image: helios/strategist:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8002
          name: http
        env:
        - name: STRATEGIST_HOST
          value: "0.0.0.0"
        - name: STRATEGIST_PORT
          value: "8002"
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: helios-config
              key: LOG_LEVEL
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@helios-redis:6379/1"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: helios-redis-secret
              key: REDIS_PASSWORD
        - name: MODEL_CACHE_SIZE
          valueFrom:
            configMapKeyRef:
              name: helios-config
              key: MODEL_CACHE_SIZE
        - name: ENABLE_GPU
          valueFrom:
            configMapKeyRef:
              name: helios-config
              key: ENABLE_GPU
        volumeMounts:
        - name: ml-models
          mountPath: /app/models
        - name: logs
          mountPath: /app/logs
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 60  # ML model loading takes time
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 20  # Allow up to 5 minutes for ML model loading
        resources:
          limits:
            cpu: "4"
            memory: "4Gi"  # ML models require significant memory
          requests:
            cpu: "1"
            memory: "2Gi"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: ml-models
        persistentVolumeClaim:
          claimName: ml-models-pvc
      - name: logs
        emptyDir: {}
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: helios-strategist
  namespace: helios
  labels:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: strategist
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: helios-strategist
    app.kubernetes.io/component: strategist
  ports:
  - port: 8002
    targetPort: 8002
    name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: helios-strategist-hpa
  namespace: helios
  labels:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: strategist
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: helios-strategist
  minReplicas: 2
  maxReplicas: 8  # Limited due to ML model memory requirements
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120  # Slower scaling due to ML model loading
      policies:
      - type: Percent
        value: 25
        periodSeconds: 120
    scaleDown:
      stabilizationWindowSeconds: 600  # Keep models loaded longer
      policies:
      - type: Percent
        value: 10
        periodSeconds: 180
