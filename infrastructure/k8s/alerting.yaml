# AlertManager and Prometheus Alert Rules for HELIOS
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: helios
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: alerting
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'helios-alerts@yourdomain.com'
      
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'helios-team'
      routes:
      - match:
          severity: critical
        receiver: 'helios-critical'
        repeat_interval: 5m
      - match:
          alertname: HighCPUUsage
        receiver: 'helios-performance'
      - match:
          alertname: HighMemoryUsage
        receiver: 'helios-performance'
    
    receivers:
    - name: 'helios-team'
      email_configs:
      - to: 'team@yourdomain.com'
        subject: '[HELIOS {{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          **Alert:** {{ .Annotations.summary }}
          **Description:** {{ .Annotations.description }}
          **Severity:** {{ .Labels.severity }}
          **Service:** {{ .Labels.service }}
          **Instance:** {{ .Labels.instance }}
          **Time:** {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
      slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#helios-alerts'
        title: 'HELIOS Alert: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          Service: {{ .Labels.service }}
          Severity: {{ .Labels.severity }}
          {{ end }}
    
    - name: 'helios-critical'
      email_configs:
      - to: 'oncall@yourdomain.com'
        subject: '[HELIOS CRITICAL] {{ .GroupLabels.alertname }}'
        body: |
          🚨 **CRITICAL ALERT** 🚨
          {{ range .Alerts }}
          **Alert:** {{ .Annotations.summary }}
          **Description:** {{ .Annotations.description }}
          **Service:** {{ .Labels.service }}
          **Instance:** {{ .Labels.instance }}
          **Started:** {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
      slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#helios-critical'
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          Service: {{ .Labels.service }}
          {{ end }}
    
    - name: 'helios-performance'
      slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#helios-performance'
        title: 'Performance Alert: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          Service: {{ .Labels.service }}
          Current Value: {{ .Annotations.current_value }}
          {{ end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: helios
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
data:
  helios-alerts.yml: |
    groups:
    - name: helios.services
      rules:
      # Service Availability
      - alert: ServiceDown
        expr: up{job=~"helios-.*"} == 0
        for: 2m
        labels:
          severity: critical
          service: "{{ $labels.job }}"
        annotations:
          summary: "HELIOS service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} on {{ $labels.instance }} has been down for more than 2 minutes."
          
      - alert: ServiceHighErrorRate
        expr: |
          (
            rate(http_requests_total{job=~"helios-.*",status=~"5.."}[5m]) /
            rate(http_requests_total{job=~"helios-.*"}[5m])
          ) * 100 > 10
        for: 5m
        labels:
          severity: warning
          service: "{{ $labels.job }}"
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value }}% for service {{ $labels.job }}"
          current_value: "{{ $value }}%"
          
      - alert: ServiceHighLatency
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job=~"helios-.*"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: "{{ $labels.job }}"
        annotations:
          summary: "High request latency on {{ $labels.job }}"
          description: "95th percentile latency is {{ $value }}s for service {{ $labels.job }}"
          current_value: "{{ $value }}s"
    
    - name: helios.resources
      rules:
      # CPU Usage
      - alert: HighCPUUsage
        expr: |
          (
            rate(container_cpu_usage_seconds_total{namespace="helios",container!="POD",container!=""}[5m]) * 100
          ) > 80
        for: 10m
        labels:
          severity: warning
          service: "{{ $labels.container }}"
        annotations:
          summary: "High CPU usage on {{ $labels.container }}"
          description: "CPU usage is {{ $value }}% for container {{ $labels.container }} in pod {{ $labels.pod }}"
          current_value: "{{ $value }}%"
          
      # Memory Usage
      - alert: HighMemoryUsage
        expr: |
          (
            container_memory_working_set_bytes{namespace="helios",container!="POD",container!=""} /
            container_spec_memory_limit_bytes{namespace="helios",container!="POD",container!=""} * 100
          ) > 85
        for: 10m
        labels:
          severity: warning
          service: "{{ $labels.container }}"
        annotations:
          summary: "High memory usage on {{ $labels.container }}"
          description: "Memory usage is {{ $value }}% for container {{ $labels.container }} in pod {{ $labels.pod }}"
          current_value: "{{ $value }}%"
          
      # Disk Usage
      - alert: HighDiskUsage
        expr: |
          (
            (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_free_bytes{mountpoint="/"}) /
            node_filesystem_size_bytes{mountpoint="/"} * 100
          ) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage on {{ $labels.instance }}"
          description: "Disk usage is {{ $value }}% on {{ $labels.instance }}"
          current_value: "{{ $value }}%"
    
    - name: helios.database
      rules:
      # PostgreSQL
      - alert: PostgreSQLDown
        expr: pg_up{job="postgres"} == 0
        for: 2m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL database is not responding"
          
      - alert: PostgreSQLTooManyConnections
        expr: |
          (
            pg_stat_activity_count{job="postgres"} /
            pg_settings_max_connections{job="postgres"} * 100
          ) > 80
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL too many connections"
          description: "PostgreSQL has {{ $value }}% connections in use"
          current_value: "{{ $value }}%"
          
      # Redis
      - alert: RedisDown
        expr: redis_up{job="redis"} == 0
        for: 2m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis is down"
          description: "Redis cache is not responding"
          
      - alert: RedisHighMemoryUsage
        expr: |
          (
            redis_memory_used_bytes{job="redis"} /
            redis_config_maxmemory{job="redis"} * 100
          ) > 85
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis high memory usage"
          description: "Redis memory usage is {{ $value }}%"
          current_value: "{{ $value }}%"
    
    - name: helios.kubernetes
      rules:
      # Pod Restarts
      - alert: PodRestarting
        expr: |
          increase(kube_pod_container_status_restarts_total{namespace="helios"}[15m]) > 0
        for: 0m
        labels:
          severity: warning
          service: "{{ $labels.container }}"
        annotations:
          summary: "Pod {{ $labels.pod }} is restarting"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted {{ $value }} times in the last 15 minutes"
          
      # Pod Not Ready
      - alert: PodNotReady
        expr: |
          kube_pod_status_ready{namespace="helios",condition="false"} == 1
        for: 5m
        labels:
          severity: warning
          service: "{{ $labels.pod }}"
        annotations:
          summary: "Pod {{ $labels.pod }} not ready"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been not ready for more than 5 minutes"
          
      # HPA at Max Replicas
      - alert: HPAMaxReplicas
        expr: |
          kube_hpa_status_current_replicas{namespace="helios"} >= kube_hpa_spec_max_replicas{namespace="helios"}
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "HPA {{ $labels.hpa }} at maximum replicas"
          description: "HPA {{ $labels.hpa }} has been at maximum replicas ({{ $value }}) for more than 10 minutes"
          
    - name: helios.business
      rules:
      # ML Model Performance
      - alert: MLModelHighLatency
        expr: |
          histogram_quantile(0.95, rate(ml_inference_duration_seconds_bucket{job="helios-strategist"}[5m])) > 5
        for: 10m
        labels:
          severity: warning
          service: strategist
        annotations:
          summary: "ML model inference latency is high"
          description: "95th percentile ML inference latency is {{ $value }}s"
          current_value: "{{ $value }}s"
          
      # Queue Depth
      - alert: HighQueueDepth
        expr: |
          task_queue_depth{job=~"helios-.*"} > 100
        for: 5m
        labels:
          severity: warning
          service: "{{ $labels.job }}"
        annotations:
          summary: "High task queue depth on {{ $labels.job }}"
          description: "Task queue depth is {{ $value }} on {{ $labels.job }}"
          current_value: "{{ $value }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: helios
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: alerting
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
      app.kubernetes.io/component: alerting
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
        app.kubernetes.io/component: alerting
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.26.0
        imagePullPolicy: IfNotPresent
        args:
        - '--config.file=/etc/alertmanager/alertmanager.yml'
        - '--storage.path=/alertmanager'
        - '--web.external-url=http://alertmanager.helios.local'
        ports:
        - containerPort: 9093
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/alertmanager
        - name: storage
          mountPath: /alertmanager
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9093
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9093
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
      volumes:
      - name: config
        configMap:
          name: alertmanager-config
      - name: storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: helios
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: alerting
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: alerting
  ports:
  - port: 9093
    targetPort: 9093
    name: http