# HELIOS Kubernetes Secrets
# Note: In production, use sealed-secrets, vault, or similar secret management
# These are base64 encoded example values - REPLACE with real secrets

apiVersion: v1
kind: Secret
metadata:
  name: helios-postgres-secret
  namespace: helios
  labels:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: database
type: Opaque
data:
  # Default values - CHANGE IN PRODUCTION
  POSTGRES_USER: aGVsaW9zX3VzZXI=  # helios_user
  POSTGRES_PASSWORD: aGVsaW9zX3Byb2RfcGFzczEyMyE=  # helios_prod_pass123!
  
---
apiVersion: v1
kind: Secret
metadata:
  name: helios-redis-secret
  namespace: helios
  labels:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: cache
type: Opaque
data:
  # Default values - CHANGE IN PRODUCTION
  REDIS_PASSWORD: cmVkaXNfcGFzc3dvcmQxMjMh  # redis_password123!
  
---
apiVersion: v1
kind: Secret
metadata:
  name: helios-app-secrets
  namespace: helios
  labels:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: application
type: Opaque
data:
  # JWT and encryption secrets - GENERATE NEW VALUES IN PRODUCTION
  JWT_SECRET_KEY: c3VwZXJfc2VjcmV0X2p3dF9rZXlfMTIzNDU2Nzg5MA==  # super_secret_jwt_key_1234567890
  ENCRYPTION_KEY: ZW5jcnlwdGlvbl9rZXlfZm9yX3NlbnNpdGl2ZV9kYXRh  # encryption_key_for_sensitive_data
  
---
apiVersion: v1
kind: Secret
metadata:
  name: helios-monitoring-secret
  namespace: helios
  labels:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: monitoring
type: Opaque
data:
  # Grafana admin credentials - CHANGE IN PRODUCTION
  GRAFANA_ADMIN_USER: YWRtaW4=  # admin
  GRAFANA_ADMIN_PASSWORD: Z3JhZmFuYV9hZG1pbl9wYXNzd29yZA==  # grafana_admin_password