apiVersion: v1
kind: ConfigMap
metadata:
  name: helios-config
  namespace: helios
  labels:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: configuration
data:
  # Global Configuration
  LOG_LEVEL: "INFO"
  CORS_ORIGINS: "https://helios.yourdomain.com,https://api.helios.yourdomain.com"
  SESSION_TIMEOUT_MINUTES: "30"

  # Database Configuration
  POSTGRES_HOST: "helios-postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "helios_career_db"

  # Redis Configuration
  REDIS_HOST: "helios-redis"
  REDIS_PORT: "6379"

  # Service URLs
  PROFILE_INGESTOR_URL: "http://helios-profile-ingestor:8001"
  STRATEGIST_URL: "http://helios-strategist:8002"
  ANALYST_URL: "http://helios-analyst:8003"
  ORCHESTRATOR_URL: "http://helios-orchestrator:8000"

  # ML Configuration
  MODEL_CACHE_SIZE: "512MB"
  ENABLE_GPU: "false"

  # Performance Tuning
  MAX_WORKERS: "4"
  POOL_SIZE: "20"
  POOL_TIMEOUT: "30"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: helios
  labels:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: nginx
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        upstream orchestrator {
            least_conn;
            server helios-orchestrator:8000 max_fails=3 fail_timeout=30s;
        }

        upstream profile-ingestor {
            least_conn;
            server helios-profile-ingestor:8001 max_fails=3 fail_timeout=30s;
        }

        upstream strategist {
            least_conn;
            server helios-strategist:8002 max_fails=3 fail_timeout=30s;
        }

        upstream analyst {
            least_conn;
            server helios-analyst:8003 max_fails=3 fail_timeout=30s;
        }

        server {
            listen 80;
            server_name _;

            # Health check endpoint
            location /health {
                access_log off;
                return 200 "healthy\n";
                add_header Content-Type text/plain;
            }

            # Main orchestrator API
            location /api/v1/ {
                proxy_pass http://orchestrator/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 30s;
                proxy_send_timeout 30s;
                proxy_read_timeout 30s;
            }

            # Profile ingestor direct access
            location /ingestor/ {
                proxy_pass http://profile-ingestor/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }

            # Rate limiting
            limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
            limit_req zone=api burst=20 nodelay;
        }
    }
