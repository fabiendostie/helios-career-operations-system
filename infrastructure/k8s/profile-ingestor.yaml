# Profile Ingestor Service Deployment for HELIOS
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helios-profile-ingestor
  namespace: helios
  labels:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: profile-ingestor
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: helios-profile-ingestor
      app.kubernetes.io/component: profile-ingestor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: helios-profile-ingestor
        app.kubernetes.io/component: profile-ingestor
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
      - name: profile-ingestor
        image: helios/profile-ingestor:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
          name: http
        env:
        - name: PROFILE_INGESTOR_HOST
          value: "0.0.0.0"
        - name: PROFILE_INGESTOR_PORT
          value: "8001"
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: helios-config
              key: LOG_LEVEL
        - name: PYTHONPATH
          value: "/app"
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        - name: output
          mountPath: /app/output
        - name: logs
          mountPath: /app/logs
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: uploads
        emptyDir: {}
      - name: output
        emptyDir: {}
      - name: logs
        emptyDir: {}
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: helios-profile-ingestor
  namespace: helios
  labels:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: profile-ingestor
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: helios-profile-ingestor
    app.kubernetes.io/component: profile-ingestor
  ports:
  - port: 8001
    targetPort: 8001
    name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: helios-profile-ingestor-hpa
  namespace: helios
  labels:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: profile-ingestor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: helios-profile-ingestor
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
