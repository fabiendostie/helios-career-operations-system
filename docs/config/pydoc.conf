# HELIOS Documentation Configuration
# Configuration file for automated documentation generation

[general]
project_name = HELIOS Career Operations System
project_description = AI-Powered Career Intelligence Platform
output_directory = docs/api
include_private_members = false
include_special_members = false

[services]
# Services to document (relative to project root)
profile-ingestor = services/profile-ingestor/src
orchestrator = services/orchestrator/src
strategist = services/strategist/src
analyst = services/analyst/src  
architect = services/architect/src
editor = services/editor/src

[exclude_patterns]
# Patterns to exclude from documentation
__pycache__
*.pyc
test_*
*_test.py
conftest.py

[styling]
theme = blue-gradient
show_badges = true
show_source_links = true