name: HELIOS Orchestrator CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/orchestrator/**'
      - '.github/workflows/orchestrator-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/orchestrator/**'

env:
  PYTHON_VERSION: '3.13'
  SERVICE_PATH: services/orchestrator

jobs:
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        cd ${{ env.SERVICE_PATH }}
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Code formatting check (Black)
      run: |
        cd ${{ env.SERVICE_PATH }}
        black --check --diff .
        
    - name: Linting (Ruff)
      run: |
        cd ${{ env.SERVICE_PATH }}
        ruff check .
        
    - name: Security scan (Bandit)
      run: |
        cd ${{ env.SERVICE_PATH }}
        bandit -r src/ -f json -o bandit-report.json || true
        
    - name: Upload security scan results
      uses: actions/upload-artifact@v4
      with:
        name: security-scan-results
        path: ${{ env.SERVICE_PATH }}/bandit-report.json
        
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        cd ${{ env.SERVICE_PATH }}
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run tests
      run: |
        cd ${{ env.SERVICE_PATH }}
        pytest -v --cov=src --cov-report=xml --cov-report=html
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ${{ env.SERVICE_PATH }}/coverage.xml
        flags: orchestrator
        name: orchestrator-coverage
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          ${{ env.SERVICE_PATH }}/htmlcov/
          ${{ env.SERVICE_PATH }}/coverage.xml
          
  docker-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      run: |
        cd ${{ env.SERVICE_PATH }}
        docker build -t helios-orchestrator:latest .
        
    - name: Test Docker image
      run: |
        cd ${{ env.SERVICE_PATH }}
        docker run --rm -d --name test-orchestrator -p 8000:8000 helios-orchestrator:latest
        sleep 10
        curl -f http://localhost:8000/health/ || exit 1
        docker stop test-orchestrator
        
  integration-test:
    runs-on: ubuntu-latest
    needs: [code-quality, test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        cd ${{ env.SERVICE_PATH }}
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run integration tests
      run: |
        cd ${{ env.SERVICE_PATH }}
        pytest tests/ -m integration -v
        
  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install pip-audit
      run: pip install pip-audit
      
    - name: Audit dependencies
      run: |
        cd ${{ env.SERVICE_PATH }}
        pip-audit --requirement requirements.txt --format=json --output=audit-report.json || true
        
    - name: Upload audit results
      uses: actions/upload-artifact@v4
      with:
        name: dependency-audit
        path: ${{ env.SERVICE_PATH }}/audit-report.json